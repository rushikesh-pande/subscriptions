spring.application.name=subscriptions
server.port=8088
spring.datasource.url=jdbc:h2:mem:subscriptionsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
management.endpoints.web.exposure.include=health,info,metrics
logging.level.com.subscriptions=INFO

# ── Security Enhancements ─────────────────────────────────────────────────
# Enhancement 1: JWT Secret (change in production!)
security.jwt.secret=change-me-in-production-must-be-at-least-32-chars-long
# Enhancement 4: Encryption Key (AES-256, 32 chars)
security.encryption.key=change-me-encryption-key-32chars!
# Enhancement 2: Rate Limiting
security.rate-limit.requests-per-minute=100
# Enhancement 6: GDPR
security.gdpr.data-retention-days=730
security.gdpr.anonymize-after-days=365
# Enhancement 5: PCI DSS (payment services)
security.pci.mask-card-numbers=true
security.pci.audit-all-transactions=true
# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/app

# ── Monitoring & Logging Enhancement ──────────────────────────────────────────
# Prometheus endpoint
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
# Micrometer histogram (for p95/p99 latency)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.75,0.95,0.99
# Kubernetes probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO

# ── Database Optimisation Enhancement ─────────────────────────────────────────
# Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# HikariCP Connection Pool tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=subscriptions-HikariPool

# JPA / Hibernate optimisation
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128
# Slow-query logging (500ms threshold)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=500
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Read-Replica DataSource (configure actual URLs in production)
datasource.primary.url=${spring.datasource.url}
datasource.primary.username=${spring.datasource.username}
datasource.primary.password=${spring.datasource.password}
datasource.replica.url=${spring.datasource.url}
datasource.replica.username=${spring.datasource.username}
datasource.replica.password=${spring.datasource.password}
datasource.routing.enabled=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Cache metrics
management.metrics.cache.instrument=true
