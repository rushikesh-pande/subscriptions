# Monitoring Enhancement: Prometheus Alert Rules for subscriptions
# Deploy to AlertManager alongside Prometheus scrape config.
groups:
  - name: subscriptions_alerts
    interval: 30s
    rules:

      # ── High Error Rate ──────────────────────────────────────────────────────
      - alert: HighErrorRate_subscriptions
        expr: |
          rate(subscriptions_errors_total{service="subscriptions"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: subscriptions
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on subscriptions"

      # ── High HTTP Latency ────────────────────────────────────────────────────
      - alert: HighLatency_subscriptions
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="subscriptions"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: subscriptions
        annotations:
          summary: "p95 latency above 2s on subscriptions"
          description: "p95 latency is {{ $value }}s on subscriptions"

      # ── Service Down ─────────────────────────────────────────────────────────
      - alert: ServiceDown_subscriptions
        expr: |
          up{job="subscriptions"} == 0
        for: 1m
        labels:
          severity: critical
          service: subscriptions
        annotations:
          summary: "subscriptions is DOWN"
          description: "subscriptions Prometheus target is not reachable"

      # ── High Heap Memory ─────────────────────────────────────────────────────
      - alert: HighHeapMemory_subscriptions
        expr: |
          (jvm_memory_used_bytes{service="subscriptions",area="heap"} /
           jvm_memory_max_bytes{service="subscriptions",area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: subscriptions
        annotations:
          summary: "JVM Heap above 85% on subscriptions"
          description: "Heap usage is {{ $value | humanizePercentage }} on subscriptions"

      # ── Too Many 5xx Responses ───────────────────────────────────────────────
      - alert: High5xxRate_subscriptions
        expr: |
          rate(http_server_requests_seconds_count{service="subscriptions",status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: subscriptions
        annotations:
          summary: "High 5xx rate on subscriptions"
          description: "5xx rate is {{ $value | humanize }} req/s on subscriptions"

      # ── High CPU Usage ───────────────────────────────────────────────────────
      - alert: HighCpuUsage_subscriptions
        expr: |
          process_cpu_usage{service="subscriptions"} > 0.80
        for: 5m
        labels:
          severity: warning
          service: subscriptions
        annotations:
          summary: "CPU above 80% on subscriptions"
          description: "CPU usage is {{ $value | humanizePercentage }} on subscriptions"
